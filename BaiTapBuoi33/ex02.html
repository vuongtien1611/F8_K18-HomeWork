<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<label for="productId">ProductId: </label>
<input id="productId" type="text">
<br><br>
<button id="buy">Mua Hàng</button>

<p id="message-checkStock"></p>
<p id="message-payment"></p>
<p id="message-Order"></p>
<script>

    // Kiểm tra tồn kho
    function checkStock(productId){

        const messageStock = document.getElementById("message-checkStock")
        messageStock.textContent = "Kiểm tra tồn kho..."

        return new Promise((resolve, reject)=>{

            setTimeout(()=>{

                if(productId === 1){

                    const product = {
                        productId: 1,
                        name: "iPhone",
                        price: 20000000,
                        stock: 5
                    }

                    messageStock.textContent = "Tồn kho hợp lệ"
                    resolve(product)

                }else{
                    reject("Sản phẩm không tồn tại")
                }

            },1000)

        })

    }



    // thanh toán
    function processPayment(product){

        const messagePayment = document.getElementById("message-payment")
        messagePayment.textContent = "Đang thanh toán..."

        return new Promise((resolve, reject)=>{

            setTimeout(()=>{

                if(product.stock > 0){

                    messagePayment.textContent = "Thanh toán thành công"
                    resolve(product)

                }else{
                    reject("Hết hàng")
                }

            },1500)

        })

    }



    // Tạo đơn hàng
    function createOrder(product){

        const messageOrder = document.getElementById("message-Order")
        messageOrder.textContent = "Đang tạo đơn hàng..."

        return new Promise((resolve)=>{

            setTimeout(()=>{

                resolve({
                    orderId: 999,
                    productName: product.name,
                    status: "SUCCESS"
                })

            },1000)

        })

    }



    // click mua hàng
    const btn = document.getElementById("buy")

    btn.addEventListener("click", ()=>{

        const productId = Number(document.getElementById("productId").value)

        checkStock(productId)
            .then((product)=>{
                return processPayment(product)
            })
            .then((product)=>{
                return createOrder(product)
            })
            .then((order)=>{

                const messageOrder = document.getElementById("message-Order")

                messageOrder.textContent = "Đặt hàng thành công!"
                console.log("Order:", order)

            })
            .catch((err)=>{

                console.log("Lỗi:", err)

                const messageStock = document.getElementById("message-checkStock")
                messageStock.textContent = "Lỗi: " + err

            })

    })

</script>
</body>
</html>

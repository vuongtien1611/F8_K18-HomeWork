<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bộ đếm truy cập</title>
</head>
<body>
<h1>Chào mừng bạn đến với trang web!</h1>

<p id="counterDisplay">Bạn đã truy cập trang này 0 lần.</p>

<button id="btnReset">Reset bộ đếm</button>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const counterDisplay = document.querySelector('#counterDisplay');
        const btnReset = document.querySelector('#btnReset');

        // Lấy giá trị hiện tại từ localStorage (trả về chuỗi hoặc null)
        let currentCount = localStorage.getItem('visitCount');
        currentCount = currentCount ? Number(currentCount) : 0;
        currentCount++;
        localStorage.setItem('visitCount', currentCount);

        counterDisplay.textContent = `Bạn đã truy cập trang này ${currentCount} lần.`;

        btnReset.addEventListener('click', () => {
            localStorage.setItem('visitCount', 0);
            counterDisplay.textContent = `Bạn đã truy cập trang này 0 lần.`;
            alert('Bộ đếm đã được đặt lại về 0!');
        });
    });
</script>
</body>
</html>
